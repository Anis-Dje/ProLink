; Pro-Link PHP overrides for the development server.
;
; Start the API with:
;   php -c php.ini -S 0.0.0.0:8081 router.php
;
; PHP's default upload limits (upload_max_filesize=2M, post_max_size=8M)
; are too small for typical schedules / training PDFs and silently
; cause the multipart request to be rejected before reaching upload.php
; — the symptom is a 400 Bad Request with no log entry. Bumping these
; here keeps the demo painless for files up to ~50 MB. The max-link
; option in the upload screens covers anything larger.

upload_max_filesize = 50M
post_max_size       = 55M
memory_limit        = 256M
max_execution_time  = 60
max_input_time      = 60

; Make sure the Postgres extension is loaded (XAMPP on Windows needs
; this; on Linux it's usually already enabled by the system php.ini).
extension = pdo_pgsql
