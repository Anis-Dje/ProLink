; Pro-Link PHP overrides — kept here as documentation only.
;
; The PHP built-in dev server *ignores* this file in CWD on a stock
; install. Loading it via `php -c php.ini` works but **disables the
; system php.ini entirely**, which on Windows drops the configured
; extension_dir and the API loses pdo_pgsql.
;
; The repo's start.bat / start.sh therefore use `-d key=value` flags
; instead, which override individual values without replacing the
; system ini. If you need to apply these values another way (e.g. by
; copying them into your real php.ini), this file is the canonical
; source of truth.

upload_max_filesize = 50M
post_max_size       = 55M
memory_limit        = 256M
max_execution_time  = 60
max_input_time      = 60
