name: prolink
description: Pro-Link - Professional Internship Management App for Constantine 2 University
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking (course: Flutter - REST API)
  http: ^1.2.2
  # State Management (course: State Management parts 1 & 2)
  provider: ^6.1.2
  # File picking for the upload UI. No course-taught alternative for
  # opening the native picker; kept as the thinnest practical shim.
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  # Date formatting / path joining / id generation.
  intl: ^0.19.0
  uuid: ^4.4.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
