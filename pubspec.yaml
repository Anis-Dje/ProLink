name: prolink
description: Pro-Link - Professional Internship Management App for Constantine 2 University
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  # State Management
  provider: ^6.1.2
  # Navigation
  go_router: ^14.2.7
  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  shimmer: ^3.0.0
  intl: ^0.19.0
  # Utils
  uuid: ^4.4.2
  path: ^1.9.0
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
